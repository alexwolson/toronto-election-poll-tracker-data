name: Update model data

on:
  schedule:
    - cron: "0 12 * * *"  # daily at noon UTC
  workflow_dispatch:       # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Process raw data
        run: uv run scripts/process_all.py

      - name: Build model snapshot
        run: uv run scripts/build_snapshot.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --cached --quiet || git commit -m "data: update model snapshot [skip ci]"
          git push
